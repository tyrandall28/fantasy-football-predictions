# Fantasy Football Predictor Configuration

# Model configurations
model:
  # Random Forest parameters
  random_forest:
    n_estimators: 500
    max_depth: 10
    min_samples_split: 5
    min_samples_leaf: 2
    random_state: 42
  
  # XGBoost parameters
  xgboost:
    n_estimators: 1000
    max_depth: 6
    learning_rate: 0.05
    subsample: 0.8
    colsample_bytree: 0.8
    random_state: 42
  
  # Linear Regression parameters
  linear_regression:
    fit_intercept: true
    positive: false
  
  # Gradient Boosting parameters
  gradient_boosting:
    n_estimators: 500
    max_depth: 5
    learning_rate: 0.05
    subsample: 0.8
    random_state: 42

# Data configurations
data:
  # Data directory paths
  raw_data_dir: "data/raw"        # Original, unmodified data
  processed_data_dir: "data/processed"  # Cleaned fantasy data (CSV files)
  external_data_dir: "data/external"    # External sources (ESPN rankings)
  
  # Training parameters
  test_size: 0.2
  validation_size: 0.1
  random_state: 42
  
  # Data processing - OPTIMIZED: 8-year window based on time window experiment
  # Provides optimal performance: 0.760 Spearman correlation vs 0.634 with 10-year window
  seasons_for_training: [2015, 2016, 2017, 2018, 2019, 2020, 2021, 2022]
  prediction_season: 2024
  
  # Feature engineering
  n_lag_seasons: 3
  min_games_threshold: 4

# Feature configurations
features:
  # Core statistics to create lagged features for
  stats_to_lag:
    - "age"
    - "games"
    - "games_started"
    - "completions"
    - "pass_attempts"
    - "pass_yards"
    - "pass_tds"
    - "ints"
    - "rush_attempts"
    - "rush_yards"
    - "rush_tds"
    - "targets"
    - "receptions"
    - "rec_yds"
    - "rec_tds"
    - "fumbles"
    - "fumbles_lost"
    - "ppr_fantasy_points"
  
  # Categorical features
  categorical:
    - "position"
  
  # Numeric features requiring scaling
  numeric_features_to_scale:
    - "age"
    - "games"
    - "fantasy_points"
    - "yards"
    - "touchdowns"

# Evaluation configurations
evaluation:
  metrics:
    - "spearman_correlation"
    - "mean_absolute_error"
    - "r2_score"
    - "kendall_tau"
  
  # Cross-validation
  cv_folds: 5
  cv_scoring: "neg_mean_absolute_error"

# Model persistence
model_persistence:
  trained_models_dir: "models/trained_models"
  model_filename: "ff_predictor_{model_name}_{timestamp}.joblib"

# Logging configuration
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "logs/ff_predictor.log"

# Visualization settings
visualization:
  figure_size: [12, 8]
  color_palette: "viridis"
  save_plots: true
  plots_dir: "reports/figures" 